function SummaryBar({clients}){
  const all=clients.flatMap(c=>c.stakeholders);
  const counts={red:0,amber:0,green:0};
  all.forEach(s=>{counts[getRag(s.last,s.freqDays)]++;});
  const due7=all.filter(s=>{const d=daysUntilDue(s.last,s.freqDays);return d>0&&d<=7;});
  const tiles=[
    {label:"Total Stakeholders",val:all.length,color:C.accent},
    {label:"On Track",val:counts.green,color:C.green.dot},
    {label:"Due Soon",val:counts.amber,color:C.amber.dot},
    {label:"Overdue",val:counts.red,color:C.red.dot,pulse:true},
    {label:"Due This Week",val:due7.length,color:"#a78bfa"},

    <div className="grid-5">

function AlertsPanel({clients}){
  const alerts=[];
  clients.forEach(c=>{
    c.stakeholders.forEach(s=>{
      const rag=getRag(s.last,s.freqDays);
      const due=daysUntilDue(s.last,s.freqDays);
      if(rag==="red") alerts.push({type:"red",msg:`${s.name} (${c.name}) — overdue by ${Math.abs(due)} days`,assignedTo:s.assignedTo});
      else if(rag==="amber") alerts.push({type:"amber",msg:`${s.name} (${c.name}) — due in ~${due} days`,assignedTo:s.assignedTo});
      else if(due<=7&&due>=0) alerts.push({type:"upcoming",msg:`${s.name} (${c.name}) — touch due in ${due} days`,assignedTo:s.assignedTo});
    });
  });
  alerts.sort((a,b)=>({red:0,amber:1,upcoming:2})[a.type]-({red:0,amber:1,upcoming:2})[b.type]);
  if(!alerts.length) return <div style={{background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 22px",color:C.muted,fontSize:13,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>✅ No alerts — all stakeholders are on track.</div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {alerts.map((a,i)=>{
        const col=a.type==="red"?C.red:a.type==="amber"?C.amber:{bg:"#0f1e3d",border:"#1e3a7a",text:"#93c5fd",dot:"#60a5fa"};
        return(
          <div key={i} className="kit-alert-row" style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:8,padding:"11px 15px",display:"flex",alignItems:"center",gap:12}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:col.dot,flexShrink:0,display:"inline-block"}}/>
            <span style={{flex:1,fontSize:13,color:col.text}}>{a.msg}</span>
            <span className="kit-alert-assignee" style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>→ {a.assignedTo}</span>
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [selectedClient,setSelectedClient]=useState(null);
  const [showAddClient,setShowAddClient]=useState(false);
  const [logTarget,setLogTarget]=useState(null);
  const [logDate,setLogDate]=useState(new Date().toISOString().split("T")[0]);
  const [saving,setSaving]=useState(false);
  const [syncMsg,setSyncMsg]=useState(null);
  const [search,setSearch]=useState("");
  const [quadFilter,setQuadFilter]=useState("all");
  const seeded=useRef(false);

  const flash=(msg,ms=2500)=>{setSyncMsg(msg);setTimeout(()=>setSyncMsg(null),ms);};

  // Load all data
  const fetchAll=useCallback(async()=>{
    try{
      const [cr,sr]=await Promise.all([
        supabase.from("clients").select("*").order("name"),
        supabase.from("stakeholders").select("*"),
      ]);
      if(cr.error) throw cr.error;
      if(sr.error) throw sr.error;
      const map={};
      cr.data.forEach(c=>{map[c.id]={id:c.id,name:c.name,segment:c.segment,stakeholders:[]};});
      sr.data.forEach(s=>{if(map[s.client_id]) map[s.client_id].stakeholders.push(skFromDb(s));});
      return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
    }catch(e){setError(e.message);return null;}
  },[]);

  // Seed if empty
  const seedIfEmpty=useCallback(async()=>{
    if(seeded.current) return;
    seeded.current=true;
    const {data}=await supabase.from("clients").select("id").limit(1);
    if(data&&data.length===0){
      await supabase.from("clients").insert(SEED_CLIENTS);
      await supabase.from("stakeholders").insert(SEED_STAKEHOLDERS);
    }
  },[]);

  const forceReseed=useCallback(async()=>{
    if(!window.confirm("⚠️ This will DELETE all current data and reload with the latest master data. Are you sure?")) return;
    setLoading(true);
    await supabase.from("stakeholders").delete().neq("id","__none__");
    await supabase.from("clients").delete().neq("id","__none__");
    await supabase.from("clients").insert(SEED_CLIENTS);
    await supabase.from("stakeholders").insert(SEED_STAKEHOLDERS);
    const data=await fetchAll();
    if(data) setClients(data);
    setLoading(false);
    flash("✅ Data reloaded with latest master data");
  },[fetchAll]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      await seedIfEmpty();
      const data=await fetchAll();
      if(data) setClients(data);
      setLoading(false);
    })();

    // Real-time subscriptions
    const sub=supabase.channel("kit-changes")
      .on("postgres_changes",{event:"*",schema:"public",table:"clients"},async()=>{
        const data=await fetchAll();
        if(data){setClients(data);flash("🔄 Data synced");}
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"stakeholders"},async()=>{
        const data=await fetchAll();
        if(data){setClients(data);flash("🔄 Data synced");}
      })
      .subscribe();

    return()=>{supabase.removeChannel(sub);};
  },[fetchAll,seedIfEmpty]);

  // ── DB operations ──────────────────────────────────
  const addClient=async(c)=>{
    setSaving(true);
    const{error}=await supabase.from("clients").insert({id:c.id,name:c.name,segment:c.segment});
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
    setSaving(false);setShowAddClient(false);
  };
  const deleteClient=async(id)=>{
    if(!window.confirm("Delete this client and all their stakeholders?")) return;
    await supabase.from("clients").delete().eq("id",id);
    const data=await fetchAll();if(data)setClients(data);
  };
  const addStakeholder=async(clientId,sk)=>{
    const row=skToDb({...sk,id:uid()},clientId);
    const{error}=await supabase.from("stakeholders").insert(row);
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
  };
  const updateStakeholder=async(clientId,sk)=>{
    const row=skToDb(sk,clientId);
    const{error}=await supabase.from("stakeholders").update(row).eq("id",sk.id);
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
  };
  const deleteStakeholder=async(clientId,skId)=>{
    if(!window.confirm("Remove this stakeholder?")) return;
    await supabase.from("stakeholders").delete().eq("id",skId);
    const data=await fetchAll();if(data)setClients(data);
  };
  const logContact=async(clientId,skId,date)=>{
    const{error}=await supabase.from("stakeholders").update({last_contact:date}).eq("id",skId);
    if(error) alert("Error: "+error.message);
    else{flash("✅ Contact logged");const data=await fetchAll();if(data)setClients(data);}
  };
  const saveLog=async()=>{
    setSaving(true);
    await logContact(logTarget.clientId,logTarget.skId,logDate);
    setSaving(false);setLogTarget(null);
  };

  const filtered=clients.filter(c=>{
    const nameOk=c.name.toLowerCase().includes(search.toLowerCase());
    const quadOk=quadFilter==="all"||c.segment===quadFilter;
    return nameOk&&quadOk;
  });
  const getClientRag=(c)=>{
    if(!c.stakeholders.length) return "green";
    const counts={red:0,amber:0,green:0};
    c.stakeholders.forEach(s=>counts[getRag(s.last,s.freqDays)]++);
    return counts.red>0?"red":counts.amber>0?"amber":"green";
  };

  if(!configDone) return <SetupScreen/>;
  if(loading) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <Spinner/>
      <div style={{fontSize:13,color:C.muted}}>Loading your KIT data…</div>
    </div>
  );
  if(error) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:C.red.bg,border:`1px solid ${C.red.border}`,borderRadius:12,padding:"28px 32px",maxWidth:480,textAlign:"center"}}>
        <div style={{fontSize:"1.5rem",marginBottom:12}}>⚠️</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",marginBottom:8}}>Connection Error</div>
        <div style={{fontSize:13,color:C.red.text,lineHeight:1.7}}>{error}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:12}}>Check your Supabase URL and anon key are correct.</div>
      </div>
    </div>
  );

  const selClient=clients.find(x=>x.id===selectedClient);
  if(selClient) return(
    <div className="kit-page-content" style={{background:C.bg,minHeight:"100vh",padding:"24px 16px"}}>
      {syncMsg&&<div style={{position:"fixed",top:16,right:16,background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:12,color:C.muted,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>{syncMsg}</div>}
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <ClientDetail client={selClient} onAddSk={(sk)=>addStakeholder(selClient.id,sk)} onUpdateSk={(sk)=>updateStakeholder(selClient.id,sk)} onDeleteSk={deleteStakeholder} onLogContact={logContact} onBack={()=>setSelectedClient(null)}/>
      </div>
    </div>
  );

  const segLabel={must_focus:"1- Must Focus",revenue_engine:"2- Revenue Engine",maintain:"3- Maintain/Optimize",low_focus:"4- Low Focus",new_hunting:"5- New Hunting"};
  const segColor={must_focus:"#dc2626",revenue_engine:"#ea580c",maintain:"#2563eb",low_focus:"#6b7a99",new_hunting:"#059669"};

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      {syncMsg&&<div style={{position:"fixed",top:16,right:16,background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:12,color:C.muted,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>{syncMsg}</div>}
      <div className="kit-sticky-header" style={{background:"#ffffff",borderBottom:`1px solid ${C.border}`,padding:"0 28px",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>

              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:700,marginBottom:4}} className="kit-section-title">RAG Report</div>
              <div style={{fontSize:13,color:C.muted}}>
                {quadFilter==="all"?"Real-time status of all stakeholder touch points":`Filtered: ${segLabel[quadFilter]} · ${filtered.length} accounts`}. <span style={{color:"#22c55e"}}>● Live sync active</span>
              </div>
            </div>
            <SummaryBar clients={filtered}/>
            <RagTable clients={filtered} onLogContact={(cId,sId)=>{setLogTarget({clientId:cId,skId:sId});setLogDate(new Date().toISOString().split("T")[0]);}}/>
          </div>
        )}
        {tab==="clients"&&(
          <div className="fade">
            <div className="kit-client-header" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:700,marginBottom:4}} className="kit-section-title">Client Accounts</div>
                <div style={{fontSize:13,color:C.muted}}>{filtered.length} accounts · {filtered.reduce((a,c)=>a+c.stakeholders.length,0)} stakeholders{quadFilter!=="all"&&<span style={{color:segColor[quadFilter],fontWeight:600}}> · {segLabel[quadFilter]}</span>}</div>
              </div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" style={{background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",color:C.text,fontSize:13,fontFamily:"'IBM Plex Sans',sans-serif",width:220}}/>
            </div>

            {/* Group by quadrant when All selected; otherwise show flat grouped by CP */}
            {quadFilter==="all"?(
              /* Show all 5 quadrant groups */
              Object.entries(segLabel).map(([seg,sLabel])=>{
                const segClients=filtered.filter(c=>c.segment===seg);
                if(segClients.length===0) return null;
                const sc=segColor[seg];
                return(
                  <div key={seg} style={{marginBottom:36}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingBottom:10,borderBottom:`2px solid ${sc}33`}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:sc,flexShrink:0}}/>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1.05rem",color:sc}}>{sLabel}</div>
                      <span style={{fontSize:11,color:C.muted,background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:10,padding:"2px 9px",marginLeft:4}}>{segClients.length} accounts</span>
                    </div>
                    <div className="kit-client-cards" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                      {segClients.map(c=>{
                        const rag=getClientRag(c);
                        const t1=c.stakeholders.filter(s=>s.tier===1).length;
                        const t2=c.stakeholders.filter(s=>s.tier===2).length;
                        const counts={red:0,amber:0,green:0};
                        c.stakeholders.forEach(s=>counts[getRag(s.last,s.freqDays)]++);
                        const cp=CLIENT_PARTNERS.find(p=>p.clients.includes(c.name));
                        return(
                          <div key={c.id} style={{background:"#ffffff",border:`2px solid ${sc}33`,borderRadius:12,padding:"18px 20px",transition:"border-color .2s,box-shadow .2s",boxShadow:`0 1px 6px ${sc}10`}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor=sc;e.currentTarget.style.boxShadow=`0 4px 20px ${sc}25`;}}
                            onMouseLeave={e=>{e.currentTarget.style.borderColor=sc+"33";e.currentTarget.style.boxShadow=`0 1px 6px ${sc}10`;}}>
                            {/* Colour band top */}
                            <div style={{height:4,borderRadius:4,background:sc,marginBottom:14,marginLeft:-20,marginRight:-20,marginTop:-18,borderTopLeftRadius:10,borderTopRightRadius:10}}/>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                              <div>
                                <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.05rem",fontWeight:700,color:C.text}}>{c.name}</div>
                                <span style={{fontSize:10,background:sc+"15",color:sc,border:`1px solid ${sc}40`,borderRadius:4,padding:"2px 7px",fontFamily:"'IBM Plex Mono',monospace",marginTop:4,display:"inline-block",fontWeight:700}}>{sLabel}</span>
                                {cp&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>CP: {cp.name}</div>}
                              </div>
                              <RagBadge s={rag}/>
                            </div>
                            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                              <span style={{fontSize:11,color:C.muted,background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T1: {t1}</span>
                              <span style={{fontSize:11,color:C.muted,background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T2: {t2}</span>
                              {counts.red>0&&<span style={{fontSize:11,color:C.red.text,background:C.red.bg,border:`1px solid ${C.red.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.red} overdue</span>}
                              {counts.amber>0&&<span style={{fontSize:11,color:C.amber.text,background:C.amber.bg,border:`1px solid ${C.amber.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.amber} due soon</span>}
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <Btn style={{flex:1,textAlign:"center"}} onClick={()=>setSelectedClient(c.id)}>View Stakeholders</Btn>
                              <button onClick={()=>deleteClient(c.id)} style={{background:"#fff1f2",border:"1px solid #fecdd3",color:"#dc2626",fontSize:12,padding:"8px 12px",borderRadius:7,cursor:"pointer"}}>×</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })
            ):(
              /* Single selected quadrant — group by CP within it */
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,padding:"12px 16px",background:segColor[quadFilter]+"0e",border:`1.5px solid ${segColor[quadFilter]}33`,borderRadius:10}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:segColor[quadFilter]}}/>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:segColor[quadFilter],fontSize:"1rem"}}>{segLabel[quadFilter]}</span>
                  <span style={{fontSize:12,color:C.muted}}>· {filtered.length} accounts · {filtered.reduce((a,c)=>a+c.stakeholders.length,0)} stakeholders</span>
                </div>
                {CLIENT_PARTNERS.map(cp=>{
                  const cpClients=filtered.filter(c=>cp.clients.includes(c.name));
                  if(cpClients.length===0) return null;
                  const sc=segColor[quadFilter];
                  return(
                    <div key={cp.name} style={{marginBottom:32}}>
                      <div className="kit-cp-header" style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,paddingBottom:10,borderBottom:`2px solid ${cp.color}22`}}>
                        <div style={{width:32,height:32,borderRadius:"50%",background:cp.color+"18",border:`2px solid ${cp.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:cp.color,flexShrink:0}}>{cp.name.charAt(0)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",color:C.text}}>{cp.name}</div>
                          <div style={{fontSize:11,color:C.muted}}>Client Partner · {cpClients.length} accounts</div>
                        </div>
                      </div>
                      <div className="kit-client-cards" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                        {cpClients.map(c=>{
                          const rag=getClientRag(c);
                          const t1=c.stakeholders.filter(s=>s.tier===1).length;
                          const t2=c.stakeholders.filter(s=>s.tier===2).length;
                          const counts={red:0,amber:0,green:0};
                          c.stakeholders.forEach(s=>counts[getRag(s.last,s.freqDays)]++);
                          return(
                            <div key={c.id} style={{background:"#ffffff",border:`2px solid ${sc}33`,borderRadius:12,padding:"18px 20px",transition:"border-color .2s,box-shadow .2s",boxShadow:`0 1px 6px ${sc}10`}}
                              onMouseEnter={e=>{e.currentTarget.style.borderColor=sc;e.currentTarget.style.boxShadow=`0 4px 20px ${sc}25`;}}
                              onMouseLeave={e=>{e.currentTarget.style.borderColor=sc+"33";e.currentTarget.style.boxShadow=`0 1px 6px ${sc}10`;}}>
                              <div style={{height:4,borderRadius:4,background:sc,marginBottom:14,marginLeft:-20,marginRight:-20,marginTop:-18,borderTopLeftRadius:10,borderTopRightRadius:10}}/>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                                <div>
                                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.05rem",fontWeight:700,color:C.text}}>{c.name}</div>
                                  <span style={{fontSize:10,background:sc+"15",color:sc,border:`1px solid ${sc}40`,borderRadius:4,padding:"2px 7px",fontFamily:"'IBM Plex Mono',monospace",marginTop:4,display:"inline-block",fontWeight:700}}>{segLabel[c.segment]}</span>
                                </div>
                                <RagBadge s={rag}/>
                              </div>
                              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                                <span style={{fontSize:11,color:C.muted,background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T1: {t1}</span>
                                <span style={{fontSize:11,color:C.muted,background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T2: {t2}</span>
                                {counts.red>0&&<span style={{fontSize:11,color:C.red.text,background:C.red.bg,border:`1px solid ${C.red.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.red} overdue</span>}
                                {counts.amber>0&&<span style={{fontSize:11,color:C.amber.text,background:C.amber.bg,border:`1px solid ${C.amber.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.amber} due soon</span>}
                              </div>
                              <div style={{display:"flex",gap:8}}>
                                <Btn style={{flex:1,textAlign:"center"}} onClick={()=>setSelectedClient(c.id)}>View Stakeholders</Btn>
                                <button onClick={()=>deleteClient(c.id)} style={{background:"#fff1f2",border:"1px solid #fecdd3",color:"#dc2626",fontSize:12,padding:"8px 12px",borderRadius:7,cursor:"pointer"}}>×</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"48px",color:C.muted,fontSize:14}}>No clients match your search or filter.</div>
            )}
          </div>
        )}
      </div>

      {showAddClient&&<Modal title="Add New Client" onClose={()=>!saving&&setShowAddClient(false)}>
        <AddClientForm onSave={addClient} onCancel={()=>setShowAddClient(false)} saving={saving}/>
      </Modal>}
      {logTarget&&<Modal title="Log Touch Point" onClose={()=>!saving&&setLogTarget(null)} width={380}>
        <div style={{marginBottom:16,fontSize:13,color:C.muted}}>Record the date of your most recent contact with this stakeholder.</div>
        <Inp label="Contact Date" type="date" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4,alignItems:"center"}}>
          {saving&&<Spinner/>}
          <Btn v="ghost" onClick={()=>setLogTarget(null)} disabled={saving}>Cancel</Btn>
          <Btn v="success" onClick={saveLog} disabled={saving}>✓ Save Contact</Btn>
        </div>
      </Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
