      </div>
      {f.strength&&<div style={{background:"#0c1220",border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 13px",marginBottom:14,fontSize:12,color:C.muted}}>
        <span style={{color:C.accent,fontWeight:600}}>Strength {f.strength}:</span> {STRENGTH_DESC[f.strength]}
      </div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",alignItems:"center"}}>
        {saving&&<Spinner/>}
        <Btn v="ghost" onClick={onCancel} disabled={saving}>Cancel</Btn>
        <Btn onClick={()=>f.name&&onSave(f)} disabled={saving||!f.name}>Save Stakeholder</Btn>
      </div>
    </div>
  );
}

// ── Dashboard panels ───────────────────────────────────
function SummaryBar({clients}){
  const all=clients.flatMap(c=>c.stakeholders);
  const counts={red:0,amber:0,green:0};
  all.forEach(s=>{counts[getRag(s.last,s.freqDays)]++;});
  const due7=all.filter(s=>{const d=daysUntilDue(s.last,s.freqDays);return d>0&&d<=7;});
  const tiles=[
    {label:"Total Stakeholders",val:all.length,color:C.accent},
    {label:"On Track",val:counts.green,color:C.green.dot},
    {label:"Due Soon",val:counts.amber,color:C.amber.dot},
    {label:"Overdue",val:counts.red,color:C.red.dot,pulse:true},
    {label:"Due This Week",val:due7.length,color:"#a78bfa"},
  ];
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:28}}>
      {tiles.map(t=>(
        <div key={t.label} className={t.pulse&&counts.red>0?"pulse":""} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px"}}>
          <div style={{fontSize:24,fontFamily:"'Syne',sans-serif",fontWeight:700,color:t.color}}>{t.val}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3,letterSpacing:".05em"}}>{t.label}</div>
        </div>
      ))}
    </div>
  );
}

function AlertsPanel({clients}){
  const alerts=[];
  clients.forEach(c=>{
    c.stakeholders.forEach(s=>{
      const rag=getRag(s.last,s.freqDays);
      const due=daysUntilDue(s.last,s.freqDays);
      if(rag==="red") alerts.push({type:"red",msg:`${s.name} (${c.name}) — overdue by ${Math.abs(due)} days`,assignedTo:s.assignedTo});
      else if(rag==="amber") alerts.push({type:"amber",msg:`${s.name} (${c.name}) — due in ~${due} days`,assignedTo:s.assignedTo});
      else if(due<=7&&due>=0) alerts.push({type:"upcoming",msg:`${s.name} (${c.name}) — touch due in ${due} days`,assignedTo:s.assignedTo});
    });
  });
  alerts.sort((a,b)=>({red:0,amber:1,upcoming:2})[a.type]-({red:0,amber:1,upcoming:2})[b.type]);
  if(!alerts.length) return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 22px",color:C.muted,fontSize:13}}>✅ No alerts — all stakeholders are on track.</div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {alerts.map((a,i)=>{
        const col=a.type==="red"?C.red:a.type==="amber"?C.amber:{bg:"#0f1e3d",border:"#1e3a7a",text:"#93c5fd",dot:"#60a5fa"};
        return(
          <div key={i} style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:8,padding:"11px 15px",display:"flex",alignItems:"center",gap:12}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:col.dot,flexShrink:0,display:"inline-block"}}/>
            <span style={{flex:1,fontSize:13,color:col.text}}>{a.msg}</span>
            <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>→ {a.assignedTo}</span>
          </div>
        );
      })}
    </div>
  );
}

function RagTable({clients,onLogContact}){
  const [filter,setFilter]=useState("all");
  const [assignFilter,setAssignFilter]=useState("all");
  const rows=[];
  clients.forEach(c=>{
    c.stakeholders.forEach(s=>{
      rows.push({...s,clientName:c.name,clientId:c.id,rag:getRag(s.last,s.freqDays),due:daysUntilDue(s.last,s.freqDays)});
    });
  });
  const filtered=rows.filter(r=>(filter==="all"||r.rag===filter)&&(assignFilter==="all"||r.assignedTo===assignFilter))
    .sort((a,b)=>({red:0,amber:1,green:2})[a.rag]-({red:0,amber:1,green:2})[b.rag]);
  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {["all","red","amber","green"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 14px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:".08em",textTransform:"uppercase",border:"1px solid",background:filter===f?(f==="all"?C.accent:C[f]?.dot||C.accent):"transparent",color:filter===f?"#000":(f==="all"?C.muted:C[f]?.text||C.muted),borderColor:f==="all"?C.border:C[f]?.border||C.border}}>
            {f==="all"?`All (${rows.length})`:f==="red"?`Overdue (${rows.filter(r=>r.rag==="red").length})`:f==="amber"?`Due Soon (${rows.filter(r=>r.rag==="amber").length})`:`On Track (${rows.filter(r=>r.rag==="green").length})`}
          </button>
        ))}
        <select value={assignFilter} onChange={e=>setAssignFilter(e.target.value)} style={{background:"#0c1018",border:`1px solid ${C.border}`,borderRadius:20,padding:"6px 14px",color:C.muted,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",marginLeft:"auto"}}>
          <option value="all">All Team Members</option>
          {TEAM.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
          <thead>
            <tr style={{background:"#0c1018"}}>
              {["Status","Stakeholder","Role","Client","Tier","Strength","Assigned To","Frequency","Last Contact","Days Until Due","Action"].map(h=>(
                <th key={h} style={{padding:"10px 13px",textAlign:"left",fontSize:10,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",fontWeight:500,borderBottom:`1px solid ${C.border}`,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((r,i)=>(
              <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,.01)"}}>
                <td style={{padding:"10px 13px"}}><RagDot s={r.rag} pulse/></td>
                <td style={{padding:"10px 13px",fontSize:13,color:C.text,fontWeight:500,whiteSpace:"nowrap"}}>{r.name}</td>
                <td style={{padding:"10px 13px",fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>{r.role}</td>
                <td style={{padding:"10px 13px",fontSize:12,color:C.accent,whiteSpace:"nowrap"}}>{r.clientName}</td>
                <td style={{padding:"10px 13px",fontSize:12,color:C.muted}}>T{r.tier}</td>
                <td style={{padding:"10px 13px"}}><span style={{fontSize:12,fontWeight:700,color:r.strength==="A"?"#4ade80":r.strength==="B"?C.accent:r.strength==="C"?C.amber.text:C.muted}}>{r.strength}</span></td>
                <td style={{padding:"10px 13px",fontSize:12,color:r.assignedTo.includes("You")?C.accent:C.muted,whiteSpace:"nowrap"}}>{r.assignedTo}</td>
                <td style={{padding:"10px 13px",fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>{freqLabel(r.freqDays)}</td>
                <td style={{padding:"10px 13px",fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>{r.last||"—"}</td>
                <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}><span style={{fontSize:12,color:r.due<0?C.red.text:r.due<=7?C.amber.text:C.green.text,fontFamily:"'IBM Plex Mono',monospace"}}>{r.due<0?`${Math.abs(r.due)}d overdue`:`${r.due}d`}</span></td>
                <td style={{padding:"10px 13px"}}><button onClick={()=>onLogContact(r.clientId,r.id)} style={{background:"#0f1e3d",border:"1px solid #1e3a7a",color:"#93c5fd",fontSize:11,padding:"4px 10px",borderRadius:5,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap"}}>Log Touch</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        {!filtered.length&&<div style={{padding:"32px",textAlign:"center",color:C.muted,fontSize:13}}>No stakeholders match this filter.</div>}
      </div>
    </div>
  );
}

function ClientDetail({client,onAddSk,onUpdateSk,onDeleteSk,onLogContact,onBack}){
  const [showAdd,setShowAdd]=useState(false);
  const [editSk,setEditSk]=useState(null);
  const [logId,setLogId]=useState(null);
  const [logDate,setLogDate]=useState(new Date().toISOString().split("T")[0]);
  const [saving,setSaving]=useState(false);

  const handleAdd=async(sk)=>{setSaving(true);await onAddSk(sk);setSaving(false);setShowAdd(false);};
  const handleUpdate=async(sk)=>{setSaving(true);await onUpdateSk(sk);setSaving(false);setEditSk(null);};
  const handleLog=async(skId)=>{setSaving(true);await onLogContact(client.id,skId,logDate);setSaving(false);setLogId(null);};

  const segLabel={large:"Large Scalable",medium:"Medium Scalable",small:"Small Account"};
  const tiers=[{label:"Tier 1 — C-Suite & Senior Stakeholders",t:1},{label:"Tier 2 — C-2 / C-3 Stakeholders",t:2},{label:"Tier 3 — Others / New Logos",t:3}];

  const SkRow=({s})=>{
    const rag=getRag(s.last,s.freqDays);
    const due=daysUntilDue(s.last,s.freqDays);
    return(
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <RagDot s={rag} pulse/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>{s.name}</span>
            <span style={{fontSize:11,color:C.muted}}>{s.role}</span>
            <span style={{fontSize:11,fontWeight:700,color:s.strength==="A"?"#4ade80":s.strength==="B"?C.accent:s.strength==="C"?C.amber.text:C.muted}}>Str.{s.strength}</span>
            <RagBadge s={rag}/>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:4,display:"flex",gap:14,flexWrap:"wrap"}}>
            <span>→ {s.assignedTo}</span><span>Freq: {freqLabel(s.freqDays)}</span><span>Last: {s.last||"Never"}</span>
            <span style={{color:due<0?C.red.text:due<=7?C.amber.text:C.green.text,fontFamily:"'IBM Plex Mono',monospace"}}>{due<0?`${Math.abs(due)}d overdue`:due===0?"Due today":`Due in ${due}d`}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          <button onClick={()=>{setLogId(s.id);setLogDate(new Date().toISOString().split("T")[0]);}} style={{background:"#052e16",border:"1px solid #166534",color:"#4ade80",fontSize:11,padding:"5px 10px",borderRadius:5,cursor:"pointer"}}>Log</button>
          <button onClick={()=>setEditSk(s)} style={{background:"#0f1e3d",border:"1px solid #1e3a7a",color:"#93c5fd",fontSize:11,padding:"5px 10px",borderRadius:5,cursor:"pointer"}}>Edit</button>
          <button onClick={()=>onDeleteSk(client.id,s.id)} style={{background:"#3d0c0c",border:"1px solid #7f1d1d",color:"#f87171",fontSize:11,padding:"5px 10px",borderRadius:5,cursor:"pointer"}}>×</button>
        </div>
      </div>
    );
  };

  return(
    <div className="fade">
      <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,letterSpacing:".05em",marginBottom:20,display:"flex",alignItems:"center",gap:6}}>← Back to Dashboard</button>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.7rem",fontWeight:700,color:C.text}}>{client.name}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{segLabel[client.segment]} · {client.stakeholders.length} stakeholders</div>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Add Stakeholder</Btn>
      </div>
      {tiers.map(({label,t})=>{const list=client.stakeholders.filter(s=>s.tier===t);return list.length>0&&(
        <div key={t} style={{marginBottom:24}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:".12em",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>{label}</div>
          {list.map(s=><SkRow key={s.id} s={s}/>)}
        </div>
      );})}
      {client.stakeholders.length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:C.muted,fontSize:14}}>No stakeholders yet. Click "+ Add Stakeholder" to get started.</div>}
      {showAdd&&<Modal title={`Add Stakeholder — ${client.name}`} onClose={()=>!saving&&setShowAdd(false)} width={600}><StakeholderForm onSave={handleAdd} onCancel={()=>setShowAdd(false)} saving={saving}/></Modal>}
      {editSk&&<Modal title="Edit Stakeholder" onClose={()=>!saving&&setEditSk(null)} width={600}><StakeholderForm init={editSk} onSave={handleUpdate} onCancel={()=>setEditSk(null)} saving={saving}/></Modal>}
      {logId&&<Modal title="Log Touch Point" onClose={()=>!saving&&setLogId(null)} width={380}>
        <div style={{marginBottom:16,fontSize:13,color:C.muted}}>Record the date you last connected with this stakeholder.</div>
        <Inp label="Contact Date" type="date" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4,alignItems:"center"}}>
          {saving&&<Spinner/>}
          <Btn v="ghost" onClick={()=>setLogId(null)} disabled={saving}>Cancel</Btn>
          <Btn v="success" onClick={()=>handleLog(logId)} disabled={saving}>✓ Save Contact</Btn>
        </div>
      </Modal>}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────
function App(){
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [selectedClient,setSelectedClient]=useState(null);
  const [showAddClient,setShowAddClient]=useState(false);
  const [logTarget,setLogTarget]=useState(null);
  const [logDate,setLogDate]=useState(new Date().toISOString().split("T")[0]);
  const [saving,setSaving]=useState(false);
  const [syncMsg,setSyncMsg]=useState(null);
  const [search,setSearch]=useState("");
  const seeded=useRef(false);

  const flash=(msg,ms=2500)=>{setSyncMsg(msg);setTimeout(()=>setSyncMsg(null),ms);};

  // Load all data
  const fetchAll=useCallback(async()=>{
    try{
      const [cr,sr]=await Promise.all([
        supabase.from("clients").select("*").order("name"),
        supabase.from("stakeholders").select("*"),
      ]);
      if(cr.error) throw cr.error;
      if(sr.error) throw sr.error;
      const map={};
      cr.data.forEach(c=>{map[c.id]={id:c.id,name:c.name,segment:c.segment,stakeholders:[]};});
      sr.data.forEach(s=>{if(map[s.client_id]) map[s.client_id].stakeholders.push(skFromDb(s));});
      return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
    }catch(e){setError(e.message);return null;}
  },[]);

  // Seed if empty
  const seedIfEmpty=useCallback(async()=>{
    if(seeded.current) return;
    seeded.current=true;
    const {data}=await supabase.from("clients").select("id").limit(1);
    if(data&&data.length===0){
      await supabase.from("clients").insert(SEED_CLIENTS);
      await supabase.from("stakeholders").insert(SEED_STAKEHOLDERS);
    }
  },[]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      await seedIfEmpty();
      const data=await fetchAll();
      if(data) setClients(data);
      setLoading(false);
    })();

    // Real-time subscriptions
    const sub=supabase.channel("kit-changes")
      .on("postgres_changes",{event:"*",schema:"public",table:"clients"},async()=>{
        const data=await fetchAll();
        if(data){setClients(data);flash("🔄 Data synced");}
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"stakeholders"},async()=>{
        const data=await fetchAll();
        if(data){setClients(data);flash("🔄 Data synced");}
      })
      .subscribe();

    return()=>{supabase.removeChannel(sub);};
  },[fetchAll,seedIfEmpty]);

  // ── DB operations ──────────────────────────────────
  const addClient=async(c)=>{
    setSaving(true);
    const{error}=await supabase.from("clients").insert({id:c.id,name:c.name,segment:c.segment});
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
    setSaving(false);setShowAddClient(false);
  };
  const deleteClient=async(id)=>{
    if(!window.confirm("Delete this client and all their stakeholders?")) return;
    await supabase.from("clients").delete().eq("id",id);
    const data=await fetchAll();if(data)setClients(data);
  };
  const addStakeholder=async(clientId,sk)=>{
    const row=skToDb({...sk,id:uid()},clientId);
    const{error}=await supabase.from("stakeholders").insert(row);
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
  };
  const updateStakeholder=async(clientId,sk)=>{
    const row=skToDb(sk,clientId);
    const{error}=await supabase.from("stakeholders").update(row).eq("id",sk.id);
    if(error) alert("Error: "+error.message);
    else{const data=await fetchAll();if(data)setClients(data);}
  };
  const deleteStakeholder=async(clientId,skId)=>{
    if(!window.confirm("Remove this stakeholder?")) return;
    await supabase.from("stakeholders").delete().eq("id",skId);
    const data=await fetchAll();if(data)setClients(data);
  };
  const logContact=async(clientId,skId,date)=>{
    const{error}=await supabase.from("stakeholders").update({last_contact:date}).eq("id",skId);
    if(error) alert("Error: "+error.message);
    else{flash("✅ Contact logged");const data=await fetchAll();if(data)setClients(data);}
  };
  const saveLog=async()=>{
    setSaving(true);
    await logContact(logTarget.clientId,logTarget.skId,logDate);
    setSaving(false);setLogTarget(null);
  };

  const filtered=clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const getClientRag=(c)=>{
    if(!c.stakeholders.length) return "green";
    const counts={red:0,amber:0,green:0};
    c.stakeholders.forEach(s=>counts[getRag(s.last,s.freqDays)]++);
    return counts.red>0?"red":counts.amber>0?"amber":"green";
  };

  if(!configDone) return <SetupScreen/>;
  if(loading) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <Spinner/>
      <div style={{fontSize:13,color:C.muted}}>Loading your KIT data…</div>
    </div>
  );
  if(error) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:C.red.bg,border:`1px solid ${C.red.border}`,borderRadius:12,padding:"28px 32px",maxWidth:480,textAlign:"center"}}>
        <div style={{fontSize:"1.5rem",marginBottom:12}}>⚠️</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",marginBottom:8}}>Connection Error</div>
        <div style={{fontSize:13,color:C.red.text,lineHeight:1.7}}>{error}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:12}}>Check your Supabase URL and anon key are correct.</div>
      </div>
    </div>
  );

  const selClient=clients.find(x=>x.id===selectedClient);
  if(selClient) return(
    <div style={{background:C.bg,minHeight:"100vh",padding:"32px 24px"}}>
      {syncMsg&&<div style={{position:"fixed",top:16,right:16,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:12,color:C.muted,zIndex:999}}>{syncMsg}</div>}
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <ClientDetail client={selClient} onAddSk={(sk)=>addStakeholder(selClient.id,sk)} onUpdateSk={(sk)=>updateStakeholder(selClient.id,sk)} onDeleteSk={deleteStakeholder} onLogContact={logContact} onBack={()=>setSelectedClient(null)}/>
      </div>
    </div>
  );

  const segLabel={large:"Large",medium:"Medium",small:"Small"};
  const segColor={large:"#7c3aed",medium:C.accent,small:"#0891b2"};

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      {syncMsg&&<div style={{position:"fixed",top:16,right:16,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:12,color:C.muted,zIndex:999,transition:"opacity .3s"}}>{syncMsg}</div>}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 28px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:60}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:7,height:32,background:"linear-gradient(180deg,#3b82f6,#7c3aed)",borderRadius:4}}/>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1rem",fontWeight:700,letterSpacing:"-.01em"}}>KIT Framework</div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:".1em"}}>MAHEISH K · M&amp;L BUSINESS UNIT</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {["dashboard","rag","clients"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} className={tab===t?"tab-active":""} style={{background:"none",border:"none",borderBottom:"2px solid transparent",padding:"18px 16px 16px",fontSize:12,cursor:"pointer",color:C.muted,letterSpacing:".06em",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",transition:"color .15s"}}>
                {t==="dashboard"?"Dashboard":t==="rag"?"RAG Report":"Clients"}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}} title="Live sync active"/>
            <Btn onClick={()=>setShowAddClient(true)}>+ Add Client</Btn>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 28px"}}>
        {tab==="dashboard"&&(
          <div className="fade">
            <div style={{marginBottom:24}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:700,marginBottom:4}}>Good morning, Maheish 👋</div>
              <div style={{fontSize:13,color:C.muted}}>Here's your stakeholder engagement overview across {clients.length} accounts. <span style={{color:"#22c55e"}}>● Live</span></div>
            </div>
            <SummaryBar clients={clients}/>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1rem",fontWeight:600,marginBottom:14,color:C.text}}>🔔 Alerts &amp; Upcoming Touch Points</div>
            <AlertsPanel clients={clients}/>
          </div>
        )}
        {tab==="rag"&&(
          <div className="fade">
            <div style={{marginBottom:20}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:700,marginBottom:4}}>RAG Report</div>
              <div style={{fontSize:13,color:C.muted}}>Real-time status of all stakeholder touch points. <span style={{color:"#22c55e"}}>● Live sync active</span></div>
            </div>
            <SummaryBar clients={clients}/>
            <RagTable clients={clients} onLogContact={(cId,sId)=>{setLogTarget({clientId:cId,skId:sId});setLogDate(new Date().toISOString().split("T")[0]);}}/>
          </div>
        )}
        {tab==="clients"&&(
          <div className="fade">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:700,marginBottom:4}}>Client Accounts</div>
                <div style={{fontSize:13,color:C.muted}}>{clients.length} accounts · {clients.reduce((a,c)=>a+c.stakeholders.length,0)} total stakeholders</div>
              </div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",color:C.text,fontSize:13,fontFamily:"'IBM Plex Sans',sans-serif",width:220}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
              {filtered.map(c=>{
                const rag=getClientRag(c);
                const t1=c.stakeholders.filter(s=>s.tier===1).length;
                const t2=c.stakeholders.filter(s=>s.tier===2).length;
                const counts={red:0,amber:0,green:0};
                c.stakeholders.forEach(s=>counts[getRag(s.last,s.freqDays)]++);
                return(
                  <div key={c.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",transition:"border-color .2s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.05rem",fontWeight:700}}>{c.name}</div>
                        <span style={{fontSize:10,background:segColor[c.segment]+"22",color:segColor[c.segment],border:`1px solid ${segColor[c.segment]}44`,borderRadius:4,padding:"2px 7px",letterSpacing:".08em",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",marginTop:4,display:"inline-block"}}>{segLabel[c.segment]}</span>
                      </div>
                      <RagBadge s={rag}/>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T1: {t1}</span>
                      <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px"}}>T2: {t2}</span>
                      {counts.red>0&&<span style={{fontSize:11,color:C.red.text,background:C.red.bg,border:`1px solid ${C.red.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.red} overdue</span>}
                      {counts.amber>0&&<span style={{fontSize:11,color:C.amber.text,background:C.amber.bg,border:`1px solid ${C.amber.border}`,borderRadius:5,padding:"3px 8px"}}>{counts.amber} due soon</span>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <Btn style={{flex:1,textAlign:"center"}} onClick={()=>setSelectedClient(c.id)}>View Stakeholders</Btn>
                      <button onClick={()=>deleteClient(c.id)} style={{background:"#3d0c0c",border:"1px solid #7f1d1d",color:"#f87171",fontSize:12,padding:"8px 12px",borderRadius:7,cursor:"pointer"}}>×</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {showAddClient&&<Modal title="Add New Client" onClose={()=>!saving&&setShowAddClient(false)}>
        <AddClientForm onSave={addClient} onCancel={()=>setShowAddClient(false)} saving={saving}/>
      </Modal>}
      {logTarget&&<Modal title="Log Touch Point" onClose={()=>!saving&&setLogTarget(null)} width={380}>
        <div style={{marginBottom:16,fontSize:13,color:C.muted}}>Record the date of your most recent contact with this stakeholder.</div>
        <Inp label="Contact Date" type="date" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4,alignItems:"center"}}>
          {saving&&<Spinner/>}
          <Btn v="ghost" onClick={()=>setLogTarget(null)} disabled={saving}>Cancel</Btn>
          <Btn v="success" onClick={saveLog} disabled={saving}>✓ Save Contact</Btn>
        </div>
      </Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
